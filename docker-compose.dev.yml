# Local development overlay: exposes ports on localhost for direct access.
# Run: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# Frontend: http://localhost:3000   Backend API: http://localhost:8000

services:
  postgres:
    ports:
      - "127.0.0.1:5432:5432"
  backend:
    ports:
      - "8000:8000"
  frontend:
    ports:
      - "3000:3000"
