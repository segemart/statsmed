# Statsmed: PostgreSQL + FastAPI backend + Next.js frontend
# Run everywhere: docker compose up -d --build
# Local dev ports come from docker-compose.override.yml (auto-loaded, gitignored).

services:
  postgres:
    image: postgres:15-alpine
    container_name: statsmed_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-statsmed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-statsmed}
      POSTGRES_DB: ${POSTGRES_DB:-statsmed}
    volumes:
      - statsmed_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U statsmed"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: statsmed_backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-statsmed}:${POSTGRES_PASSWORD:-statsmed}@postgres:5432/${POSTGRES_DB:-statsmed}
      JWT_SECRET: ${JWT_SECRET:-statsmed-dev-secret-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      ENV: ${ENV:-development}
    networks:
      - default
      - caddy_net
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    container_name: statsmed_frontend
    environment:
      NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    networks:
      - default
      - caddy_net
    depends_on:
      - backend

volumes:
  statsmed_pgdata:

networks:
  caddy_net:
    external: true
