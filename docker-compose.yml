# Statsmed: PostgreSQL + FastAPI backend + Next.js frontend
# Run everywhere: docker compose up -d --build
# Each environment provides its own docker-compose.override.yml (auto-loaded, gitignored).
# Service names are prefixed with sm- to avoid DNS collisions on shared Docker networks.

services:
  sm-postgres:
    image: postgres:15-alpine
    container_name: statsmed_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-statsmed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-statsmed}
      POSTGRES_DB: ${POSTGRES_DB:-statsmed}
    volumes:
      - statsmed_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U statsmed"]
      interval: 5s
      timeout: 5s
      retries: 5

  sm-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: statsmed_backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-statsmed}:${POSTGRES_PASSWORD:-statsmed}@sm-postgres:5432/${POSTGRES_DB:-statsmed}
      JWT_SECRET: ${JWT_SECRET:-statsmed-dev-secret-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      ENV: ${ENV:-development}
    depends_on:
      sm-postgres:
        condition: service_healthy

  sm-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    container_name: statsmed_frontend
    environment:
      NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    depends_on:
      - sm-backend

volumes:
  statsmed_pgdata:
